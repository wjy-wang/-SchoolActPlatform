version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-school-activity
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: school_activity
      MYSQL_USER: school_activity_user
      MYSQL_PASSWORD: school_activity_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: redis-school-activity
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx-school-activity
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html
    restart: always
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-school-activity
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    environment:
      - DATABASE_URL=mysql://school_activity_user:school_activity_pass@mysql:3306/school_activity
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-here
    restart: always

volumes:
  mysql_data:
  redis_data:
